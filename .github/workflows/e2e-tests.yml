name: Run e2e tests

on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

env:
  KUTTL_VERSION: 0.11.0

jobs:

  casskop-image:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event.issue.pull_request &&
        github.event.comment.user.login == github.repository_owner &&
        contains(github.event.comment.body, '/kuttl-tests')
      )
    permissions:
      packages: write
    steps:
      - id: lower-repo
        shell: pwsh
        run: |
          "::set-output name=repository::$($env:GITHUB_REPOSITORY.ToLowerInvariant())"
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v1.14.1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR branch name
        id: get-branch
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]
          then
            echo ::set-output name=branch::$(gh pr view ${{ github.event.issue.number }} --repo $REPO --json headRefName --jq '.headRefName')
          else
            echo ::set-output name=branch::${{ github.ref_name }}
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/casskop/Dockerfile
          tags: ghcr.io/${{ steps.lower-repo.outputs.repository }}:${{ steps.get-branch.outputs.branch }}
          push: true

  install-kuttl:
    needs: casskop-image
    runs-on: ubuntu-latest
    steps:
      - name: Cache Kuttl
        id: cache-kuttl
        uses: actions/cache@v4
        with:
          path: kuttl
          key: ${{ runner.os }}-kuttl-${{ env.KUTTL_VERSION }}

      - name: download-kuttl
        if: steps.cache-kuttl.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/kudobuilder/kuttl/releases/download/v${{ env.KUTTL_VERSION }}/kubectl-kuttl_${{ env.KUTTL_VERSION }}_linux_i386 -o kuttl

  kuttl-casskop:
    needs: install-kuttl
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        test-name: [operations, sidecars, scaling, multi-dcs, backup-restore, nodetool, storage-upsize]
    steps:
      - id: lower-repo
        shell: pwsh
        run: |
          "::set-output name=repository::$($env:GITHUB_REPOSITORY.ToLowerInvariant())"

      - name: Get PR branch name
        id: get-branch
        env:
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]
          then
            echo ::set-output name=branch::$(gh pr view ${{ github.event.issue.number }} --repo $REPO --json headRefName --jq '.headRefName')
          else
            echo ::set-output name=branch::${{ github.ref_name }}
          fi

      - name: Checkout branch
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.get-branch.outputs.branch }}

      - uses: rinx/setup-k3d@v0.0.4
        if: matrix.test-name != 'storage-upsize'
        with:
          version: v5.4.0
          options: --image rancher/k3s:v1.24.13-k3s1

      - name: Create kind config with LVM mounts
        if: matrix.test-name == 'storage-upsize'
        run: |
          mkdir -p kindAndLvm
          cat <<EOF > kindAndLvm/kind-lvm-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
          - role: worker
            extraMounts:
            - hostPath: /tmp/kind-worker1-lvm
              containerPath: /mnt/disks
          - role: worker
            extraMounts:
            - hostPath: /tmp/kind-worker2-lvm
              containerPath: /mnt/disks
          EOF
          
          mkdir -p /tmp/kind-worker1-lvm /tmp/kind-worker2-lvm

      - name: Setup kind cluster
        if: matrix.test-name == 'storage-upsize'
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: lvm-test
          config: kindAndLvm/kind-lvm-config.yaml
          wait: 300s

      - name: Setup LVM on worker nodes
        if: matrix.test-name == 'storage-upsize'
        run: |
          WORKER_NODES=$(kubectl get nodes -o name | grep worker | sed 's|node/||')
          
          for NODE in $WORKER_NODES; do
            echo "Setting up LVM on $NODE..."
            docker exec $NODE bash -c '
              apt-get update -qq && apt-get install -y -qq lvm2 thin-provisioning-tools > /dev/null 2>&1
              mkdir -p /mnt/disks
              truncate -s 10G /mnt/disks/disk.img
              LOOP_DEVICE=$(losetup -f)
              losetup $LOOP_DEVICE /mnt/disks/disk.img
              pvcreate $LOOP_DEVICE
              vgcreate lvmvg $LOOP_DEVICE
              vgs
            '
          done

      - name: Install OpenEBS LVM LocalPV
        if: matrix.test-name == 'storage-upsize'
        run: |
          kubectl apply -f https://openebs.github.io/charts/lvm-operator.yaml
          kubectl wait --for=condition=ready pod -l app=openebs-lvm-controller -n kube-system --timeout=300s
          kubectl rollout status daemonset/openebs-lvm-node -n kube-system --timeout=300s

      - name: Restore Kuttl
        id: cache-kuttl
        uses: actions/cache@v4
        with:
          path: kuttl
          key: ${{ runner.os }}-kuttl-${{ env.KUTTL_VERSION }}

      - name: Add aws-backup-secrets with S3
        if: matrix.test-name == 'backup-restore'
        working-directory: test/kuttl
        run: |
          cat <<EOF >> backup-restore/00-createCluster.yaml
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: aws-backup-secrets
          type: Opaque
          stringData:
            awsaccesskeyid: ${{ secrets.AWS_ACCESS_KEY_ID }}
            awssecretaccesskey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            awsregion: us-west-2
          EOF

          cat <<EOF >> backup-restore/00-assert.yaml
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: aws-backup-secrets
          EOF

      - name: Run kuttl tests
        run: |
          chmod u+x kuttl
          PATH=$PWD:$PATH
          helm install casskop charts/casskop --set image.tag=${{ steps.get-branch.outputs.branch }} --set image.repository=ghcr.io/${{ steps.lower-repo.outputs.repository }}
          cd test/kuttl/
          kuttl test --test ${{ matrix.test-name }} --namespace default --skip-delete
