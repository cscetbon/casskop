apiVersion: db.orange.com/v2
kind: CassandraCluster
metadata:
  name: cassandra-e2e
spec:
  envVars: []
  backRestSidecar:
    envVars: []
status:
  cassandraRackStatus:
    dc1-rack1:
      cassandraLastAction:
        name: UpdateStatefulSet
        status: Done
      phase: Running
  lastClusterAction: UpdateStatefulSet
  lastClusterActionStatus: Done
  phase: Running
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - command: >-
      go run ../scripts/assert-env-vars.go ../scripts/helpers.go
        --absent cassandra:CASSANDRA_TEST_ENV_VAR;cassandra:ANOTHER_CASSANDRA_TEST_ENV_VAR
        --absent backRestSidecar:BACKREST_TEST_ENV_VAR;backRestSidecar:ANOTHER_BACKREST_TEST_ENV_VAR